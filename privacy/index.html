  <script>
    var privacyTranslations = {"sv": {"nav_services": "Tjänster","nav_about": "Om oss","nav_contact": "Kontakt","nav_policy": "Integritetspolicy","hero_title": "Integritetspolicy","hero_desc": "Här förklarar vi hur PlaySat TV hanterar enhetsinformation, licensvalidering, köp, spellisteuppgifter, appinställningar och integritetsförfrågningar.","page_title": "Integritetspolicy för PlaySat TV","updated_label": "Senast uppdaterad:","controller_label": "Personuppgiftsansvarig och utvecklare:","website_label": "Webbplats:","support_label": "Integritet och support:","back": "Tillbaka till Playsat","home": "Hem","footer_policy": "PlaySat TV Integritetspolicy","content": "\n<div class=\"privacy-note\"><strong>Viktigt:</strong> PlaySat TV är en mediaspelare. Appen innehåller, säljer, lagrar eller distribuerar inte IPTV-abonnemang, tv-kanaler, filmer eller serier från tredje part. Användaren får endast använda spellistor och innehållskällor som användaren har laglig rätt att använda.</div>\n<h2>1. Omfattning</h2><p>Denna integritetspolicy gäller PlaySat TV på Android-mobiler och surfplattor, Android TV, iPhone, iPad, Apple TV (tvOS), LG Smart TV med webOS, Samsung Smart TV med Tizen samt andra enheter som stöds. Tillgängligheten kan variera beroende på land, enhet och godkännande i respektive appbutik.</p><p>Policyn gäller även, där det är relevant, PlaySat TV:s tjänster för provperioder, licensvalidering, enhetsaktivering, köpverifiering, demoinnehåll, kundsupport, PlaySat-webbplatsen samt backend- och säkerhetstjänster.</p><p>Fristående IPTV-leverantörer, spellisteleverantörer, innehållsleverantörer, webbplatser och andra tjänster som användaren väljer omfattas av sina egna villkor och integritetspolicyer.</p><h2>2. Information som vi behandlar</h2>\n<h3>2.1 Spellisteuppgifter och inloggningsuppgifter</h3><p>När du lägger till en spellista eller innehållskälla kan appen behandla spellistans namn, server- eller spellisteadress, användarnamn, lösenord eller åtkomsttoken samt andra anslutningsuppgifter som du anger. Uppgifterna lagras normalt lokalt på din enhet och används för att ansluta till den leverantör som du har valt.</p><p>När en begärd funktion kräver en PlaySat TV-server kan servern tillfälligt behandla de uppgifter som behövs för att utföra begäran. PlaySat TV säljer inte spellisteuppgifter och använder dem inte för reklam, marknadsföring eller profilering.</p>\n<h3>2.2 Enhets- och licensinformation</h3><p>För provperioder, enhetsaktivering, licensvalidering, säkerhet och bedrägeriförebyggande kan vi behandla ett appgenererat, enhetsbaserat eller plattformstillhandahållet enhets-ID; enhetstyp, modell, tillverkare och plattform; operativsystemsversion; appversion och buildnummer; bundle- eller paketidentifierare; status för provperiod, licens, aktivering och utgångsdatum; tidpunkt för senaste kontroll; IP-adress samt tillgänglig information för appidentitets- eller säkerhetsverifiering.</p><p>Ett enhets-ID kan visas i appen i ett MAC-adressliknande format. Det kan vara skapat av PlaySat TV och behöver inte vara enhetens fysiska nätverks-MAC-adress. Det används för att känna igen appinstallationen eller enheten för licens och säkerhet, inte för att spåra användaren mellan andra företags appar eller webbplatser.</p>\n<h3>2.3 Köp och enhetsaktivering</h3><p>Köp på iPhone, iPad och Apple TV behandlas av Apple via App Store och StoreKit. Köp på Android-mobiler, Android-surfplattor och Android TV behandlas av Google via Google Play Billing.</p><p>På LG webOS, Samsung Tizen eller en annan plattform som stöds kan tillgänglig aktiverings- och betalningsmetod skilja sig. Om en separat kassaleverantör erbjuds behandlar den leverantören betalningsuppgifterna, medan PlaySat TV endast tar emot den information som behövs för att bekräfta transaktionen och aktivera enheten.</p><p>PlaySat TV tar inte emot eller lagrar ditt fullständiga betalkortsnummer, bankkontonummer eller lösenord till Apple- eller Google-konto.</p><p>För att verifiera ett köp och leverera en aktivering kan vi behandla butik eller plattform, produkt-ID, Apple-transaktions-ID eller ursprungligt transaktions-ID, Google Play-köptoken eller order-ID där det finns, extern transaktionsreferens där det är tillämpligt, köpdatum, verifieringsresultat, återbetalnings-, avbeställnings-, återkallelse- eller transaktionsstatus, aktiverings- och utgångsdatum samt tillhörande PlaySat TV-enhets-ID.</p><h3>2.4 Lokala appinställningar</h3><p>Appen kan lokalt lagra valt språk, favoriter, fortsätt-titta-information, valda eller dolda grupper, föräldrakontroll, inställningar för spelare och undertexter samt andra gränssnittsinställningar. Information som endast finns kvar på din enhet och inte överförs till oss samlas inte in av PlaySat TV.</p>\n<h3>2.5 Produktinteraktion och tekniska uppgifter</h3><p>Vi kan behandla begränsad information som behövs för att driva och skydda tjänsten, till exempel appstarter som hör ihop med licenskontroller, tidpunkt för begäran, begärd funktion, serversvar, appversion, plattform, resultat från licens- och säkerhetskontroller samt tekniska fel som behövs för felsökning.</p>\n<h3>2.6 Support- och integritetsärenden</h3><p>Om du kontaktar oss kan vi behandla din e-postadress, ditt meddelande, bilagor som du väljer att skicka, enhets- eller transaktionsuppgifter och teknisk information som behövs för att besvara ärendet. Skicka inte spellistelösenord, lösenord till Apple- eller Google-konto, kortuppgifter eller onödiga identitetshandlingar via vanlig e-post.</p>\n<h3>2.7 Webbplatsinställningar och kontaktformulär</h3><p>PlaySat-webbplatsen kan spara valt språk i webbläsarens lokala lagring så att webbplatsen och denna integritetspolicy fortsätter att visas på det språk du valt. Inställningen används inte för reklam eller spårning mellan webbplatser.</p><p>Om du frivilligt skickar webbplatsens kontaktformulär kan vi behandla ditt namn, din e-postadress, ditt meddelande och begränsad teknisk information om begäran via vår leverantör av kontaktformulär för att kunna besvara ditt ärende.</p>\n<h3>2.8 Information som vi inte avsiktligt samlar in</h3><p>Vi samlar inte avsiktligt in fullständiga betal- eller bankkontouppgifter, hälso- eller träningsdata, adressbokskontakter, biometriska uppgifter, exakt GPS-position, foton eller videor som finns på enheten, mikrofoninspelningar eller data för tredjepartsannonsering.</p><h2>3. Varför vi använder information</h2><ul><li>Tillhandahålla appen och de funktioner som användaren begär.</li><li>Läsa in spellistor och mediekällor som användaren har valt.</li><li>Tillhandahålla lagligt demoinnehåll.</li><li>Hantera provperioder, licenser och enhetsaktiveringar.</li><li>Verifiera och leverera köp i appen.</li><li>Förhindra bedrägeri, missbruk och upprepade otillåtna provperioder.</li><li>Skydda appen, backendtjänsterna och användarna.</li><li>Felsöka tekniska problem och kompatibilitetsproblem.</li><li>Besvara support- och integritetsförfrågningar.</li><li>Uppfylla bokförings-, skatte-, myndighets- och rättsliga skyldigheter.</li></ul>\n<h2>4. Rättsliga grunder</h2><p>När GDPR eller motsvarande lagstiftning gäller grundas behandlingen på fullgörande av avtal, våra berättigade intressen av säkerhet och tillförlitlig drift, rättsliga skyldigheter eller samtycke när samtycke krävs enligt lag. Ett samtycke kan återkallas när som helst utan att tidigare laglig behandling påverkas.</p>\n<h2>5. Delning och utlämnande</h2><p>Vi säljer inte personuppgifter. Begränsad information kan behandlas av Apple för App Store-köp, av Google för Google Play-köp, av en betalningsleverantör som anges i kassan när en separat aktiveringsmetod erbjuds, av den spelliste- eller innehållsleverantör som användaren har valt samt av leverantörer av hosting, nätverk, säkerhet, e-post, kontaktformulär, innehållsleverans eller teknik som hjälper oss att driva och skydda PlaySat TV.</p><p>Dessa leverantörer får endast behandla information i den omfattning som behövs för att tillhandahålla sina tjänster eller följa lag. Vi förväntar oss att leverantörer som arbetar för vår räkning använder lämpliga sekretess- och säkerhetsskydd. Information kan även lämnas ut när det krävs enligt lag, för att skydda användare eller tjänsten, förebygga bedrägeri eller fastställa, göra gällande eller försvara rättsliga anspråk.</p><h2>6. Reklam och spårning</h2><p>PlaySat TV visar inte tredjepartsannonser, använder inte personuppgifter för riktad reklam, säljer inte data till datamäklare och kombinerar inte PlaySat TV-data med tredjepartsdata för att spåra användare mellan andra företags appar eller webbplatser.</p>\n<h2>7. Lagringstid</h2><ul><li><strong>Lokala spellistor, appinställningar och webbplatsens språkval:</strong> sparas tills du tar bort dem, rensar app- eller webbläsardata eller avinstallerar appen, med hänsyn till plattformens säkerhetskopiering.</li><li><strong>Enhets- och licensposter:</strong> sparas medan en provperiod, licens eller aktivering är aktiv och därefter endast så länge det rimligen behövs för säkerhet, bedrägeriförebyggande, tvister, rättsliga anspråk eller rättsliga skyldigheter.</li><li><strong>Köp- och transaktionsposter:</strong> sparas så länge det behövs för att verifiera och leverera aktiveringen och därefter där det krävs för återbetalningar, bokföring, skatt, bedrägeriförebyggande, tvister eller andra rättsliga skyldigheter.</li><li><strong>Server- och säkerhetsloggar:</strong> sparas endast under den tid som rimligen behövs för att skydda och driva tjänsten samt utreda fel eller missbruk.</li><li><strong>Support- och kontaktformulärkommunikation:</strong> sparas medan ärendet hanteras och därefter endast så länge det rimligen behövs för uppföljning, säkerhet, tvister eller rättsliga skyldigheter.</li></ul><p>När informationen inte längre behövs raderas, anonymiseras eller tas den ur aktiv användning, om fortsatt lagring inte krävs eller tillåts enligt lag.</p><h2>8. Säkerhet</h2><p>Vi använder rimliga tekniska och organisatoriska skyddsåtgärder, som kan omfatta krypterad nätverkskommunikation, åtkomstkontroller, begränsad serveråtkomst, köpverifiering, appidentitetskontroller och övervakning av missbruk. Ingen internetansluten tjänst kan garanteras vara helt säker.</p>\n<h2>9. Internationella överföringar</h2><p>Vissa plattforms- eller tjänsteleverantörer kan behandla information utanför ditt land, även utanför EU eller EES. När det krävs används beslut om adekvat skyddsnivå, standardavtalsklausuler eller annan laglig skyddsmekanism.</p>\n<h2>10. Dina rättigheter</h2><p>Beroende på tillämplig lag kan du begära information, tillgång, rättelse, radering, begränsning, invändning eller dataportabilitet, återkalla samtycke och klaga hos en dataskyddsmyndighet. I Sverige är tillsynsmyndigheten Integritetsskyddsmyndigheten (IMY). Rättigheterna kan begränsas när fortsatt behandling krävs för lag, säkerhet, bedrägeriförebyggande, transaktioner eller rättsliga anspråk.</p>\n<h2 id=\"privacy-choices\">11. Integritetsval och radering</h2><p>Du kan ta bort spellistor i appen där funktionen finns, rensa appdata, rensa webbplatsens sparade språkval genom webbläsaren eller avinstallera appen. En avinstallation raderar inte automatiskt serverlagrade köp-, transaktions-, licens-, bedrägeriförebyggande eller rättsliga poster.</p><p>För att begära tillgång, rättelse, begränsning, invändning eller radering, skicka e-post till <a href=\"mailto:info.playsat@gmail.com\">info.playsat@gmail.com</a> med ämnet <strong>PlaySat TV Privacy Request</strong>. Ange plattform, det enhets-ID eller MAC-adressliknande ID som visas i appen där det finns, ungefärligt aktiverings- eller köpdatum om det är relevant och en tydlig beskrivning av begäran. Skicka inte spellistelösenord eller kortuppgifter.</p><p>Vi kan begära begränsad kompletterande information när det rimligen behövs för att kontrollera att begäran gäller dina egna uppgifter. Vi svarar inom den tidsfrist som tillämplig lag kräver.</p><div class=\"privacy-warning\">Om en serverlagrad enhets- eller licenspost raderas kan appen sluta känna igen en befintlig provperiod eller aktivering. Vissa transaktions-, bokförings-, säkerhets-, återbetalnings-, bedrägeriförebyggande och rättsliga poster kan ändå behöva sparas.</div><h2>12. Barn och föräldrakontroll</h2><p>PlaySat TV riktar sig inte särskilt till barn och begär inte avsiktligt barns namn, kontaktuppgifter, plats, skolinformation eller liknande personuppgifter. Appen kan innehålla föräldrakontroll som döljer eller begränsar grupper som identifierats som vuxeninnehåll. En förälder eller vårdnadshavare ansvarar för att konfigurera kontrollen och övervaka användningen.</p>\n<h2>13. Demoläge</h2><p>Appen innehåller lagligt exempelinnehåll för demonstration och plattformsgranskning. Licenskontroller och tekniska förfrågningar i demoläget kan behandla samma begränsade enhets- och diagnostikinformation som beskrivs i denna policy.</p>\n<h2>14. Innehåll och tjänster från tredje part</h2><p>Tredje parter som användaren väljer kan ta emot nätverksinformation, inklusive IP-adress, som en del av anslutningen. PlaySat TV ansvarar inte för oberoende IPTV-leverantörers, spellisteleverantörers, webbplatsers eller andra tjänsters integritet, säkerhet, laglighet, tillgänglighet eller innehåll.</p>\n<h2>15. Ändringar av policyn</h2><p>Vi kan uppdatera policyn när appen, våra rutiner, lagstiftningen eller plattformskraven förändras. Den aktuella versionen publiceras här med nytt datum. Väsentliga ändringar kan även meddelas via appen, webbplatsen eller appbutikens produktsida när det är lämpligt.</p>\n<h2>16. Kontakt</h2><div class=\"privacy-contact\"><strong>Personuppgiftsansvarig och utvecklare:</strong> Playsat<br><strong>Plats:</strong> Stockholm, Sverige<br><strong>Applikation:</strong> PlaySat TV<br><strong>Webbplats:</strong> <a href=\"https://portal.playsattv.com\">https://portal.playsattv.com</a><br><strong>Integritets- och supportadress:</strong> <a href=\"mailto:info.playsat@gmail.com\">info.playsat@gmail.com</a></div>\n"},"en": {"nav_services": "Services","nav_about": "About","nav_contact": "Contact","nav_policy": "Privacy Policy","hero_title": "Privacy Policy","hero_desc": "This page explains how PlaySat TV handles device information, license validation, purchases, playlist information, app settings, and privacy requests.","page_title": "Privacy Policy for PlaySat TV","updated_label": "Last updated:","controller_label": "Data controller and developer:","website_label": "Website:","support_label": "Privacy and support:","back": "Back to Playsat","home": "Home","footer_policy": "PlaySat TV Privacy Policy","content": "\n<div class=\"privacy-note\"><strong>Important:</strong> PlaySat TV is a media player. It does not include, sell, host, or distribute third-party IPTV subscriptions, television channels, movies, or series. Users must only use playlists and content sources that they are legally authorized to access.</div>\n<h2>1. Scope</h2><p>This Privacy Policy applies to PlaySat TV on Android phones and tablets, Android TV, iPhone, iPad, Apple TV (tvOS), LG Smart TVs running webOS, Samsung Smart TVs running Tizen, and other supported devices. Platform availability may vary by country, device, and app-store approval.</p><p>It also applies, where relevant, to PlaySat TV services for trials, license validation, device activation, purchase verification, demo content, customer support, the PlaySat website, and backend or security services.</p><p>Independent IPTV providers, playlist providers, content providers, websites, and other services selected by the user operate under their own terms and privacy policies.</p><h2>2. Information We Process</h2>\n<h3>2.1 Playlist Information and Credentials</h3><p>When you add a playlist or content source, the app may process the playlist name, server or playlist URL, username, password or access token, and other connection information that you provide. This information is normally stored locally on your device and is used to connect to the provider selected by you.</p><p>When a requested feature requires a PlaySat TV server, the server may temporarily process the information required to complete that request. PlaySat TV does not sell playlist credentials or use them for advertising, marketing, or profiling.</p>\n<h3>2.2 Device and License Information</h3><p>For trials, device activation, license validation, security, and fraud prevention, we may process an app-generated, device-derived, or platform-provided device identifier; device type, model, manufacturer, and platform; operating-system version; app version and build number; bundle or package identifier; trial, license, activation, and expiration status; time of the latest check; Internet Protocol address; and supported app-identity or security-validation information.</p><p>A device identifier may be displayed in the app in a MAC-address-like format. It may be generated by PlaySat TV and does not necessarily represent the device's physical network MAC address. It is used to recognize the app installation or device for licensing and security, not to track users across apps or websites owned by other companies.</p>\n<h3>2.3 Purchases and Device Activation</h3><p>Purchases on iPhone, iPad, and Apple TV are processed by Apple through the App Store and StoreKit. Purchases on Android phones, Android tablets, and Android TV are processed by Google through Google Play Billing.</p><p>On LG webOS, Samsung Tizen, or another supported platform, the available activation and payment method may differ. If a separate checkout provider is offered, that provider processes the payment details and PlaySat TV receives only the information needed to confirm the transaction and activate the device.</p><p>PlaySat TV does not receive or store your complete payment-card number, bank-account number, Apple Account password, or Google Account password.</p><p>To verify a purchase and provide an activation, we may process the store or platform, product identifier, Apple transaction or original transaction identifier, Google Play purchase token or order identifier where available, external transaction reference where applicable, purchase date, verification result, refund, cancellation, revocation, or transaction status, activation and expiration dates, and the associated PlaySat TV device identifier.</p><h3>2.4 Local App Settings</h3><p>The app may store selected language, favorites, continue-watching information, selected or hidden groups, parental-control settings, player and subtitle preferences, and other interface settings locally on your device. Information that remains only on your device and is not transmitted to us is not collected by PlaySat TV.</p>\n<h3>2.5 Product Interaction and Technical Data</h3><p>We may process limited information required to operate and protect the service, such as app launches associated with license checks, request time, requested operation, server response, app version, platform, license-validation result, security-validation result, and technical errors needed to diagnose app functionality.</p>\n<h3>2.6 Support and Privacy Requests</h3><p>If you contact us, we may process your email address, message, attachments you choose to send, device or transaction information, and technical details needed to answer the request. Do not send playlist passwords, Apple or Google account passwords, payment-card details, or unnecessary identity documents by ordinary email.</p>\n<h3>2.7 Website Preferences and Contact Form</h3><p>The PlaySat website may store the selected language in your browser's local storage so that the website and this Privacy Policy remain in the language you selected. This preference is not used for advertising or cross-site tracking.</p><p>If you voluntarily submit the website contact form, we may process your name, email address, message, and limited technical request information through our contact-form service provider for the purpose of answering your request.</p>\n<h3>2.8 Information We Do Not Intentionally Collect</h3><p>We do not intentionally collect complete payment-card or bank-account details, health or fitness information, address-book contacts, biometric information, precise GPS location, photos or videos stored on your device, microphone recordings, or data for third-party advertising.</p><h2>3. Why We Use Information</h2><ul><li>Provide the app and requested features.</li><li>Load playlists and media sources selected by the user.</li><li>Provide legal demonstration content.</li><li>Manage trials, licenses, and device activations.</li><li>Verify and deliver in-app purchases.</li><li>Prevent fraud, misuse, and repeated trial abuse.</li><li>Protect the app, backend services, and users.</li><li>Troubleshoot technical and compatibility problems.</li><li>Respond to support and privacy requests.</li><li>Comply with accounting, tax, regulatory, and legal duties.</li></ul>\n<h2>4. Legal Bases</h2><p>Where the GDPR or similar laws apply, processing is based on performance of a contract, our legitimate interests in security and reliable operation, compliance with legal obligations, or consent where consent is legally required. Consent may be withdrawn at any time without affecting earlier lawful processing.</p>\n<h2>5. Sharing and Disclosure</h2><p>We do not sell personal information. Limited information may be processed by Apple for App Store purchases, by Google for Google Play purchases, by a payment provider identified at checkout where a separate activation method is offered, by the playlist or content provider selected by the user, and by hosting, network, security, email, contact-form, content-delivery, or technical service providers that help us operate and protect PlaySat TV.</p><p>These providers may process information only as needed to provide their services or comply with law. We expect service providers acting on our behalf to apply appropriate confidentiality and security protections. Information may also be disclosed when required by law, to protect users or the service, prevent fraud, or establish, exercise, or defend legal claims.</p><h2>6. Advertising and Tracking</h2><p>PlaySat TV does not display third-party advertising, does not use personal information for targeted advertising, does not sell data to data brokers, and does not combine PlaySat TV data with third-party data to track users across other companies’ apps or websites.</p>\n<h2>7. Data Retention</h2><ul><li><strong>Local playlists, app settings, and website language preference:</strong> retained until you remove them, clear app or browser data, or uninstall the app, subject to platform backup behavior.</li><li><strong>Device and license records:</strong> retained while a trial, license, or activation is active and afterward only for as long as reasonably needed for security, fraud prevention, dispute handling, legal claims, or legal obligations.</li><li><strong>Purchase and transaction records:</strong> retained for as long as needed to verify and provide the activation and afterward where required for refunds, accounting, taxation, fraud prevention, disputes, or other legal duties.</li><li><strong>Server and security logs:</strong> retained only for the period reasonably necessary to protect and operate the service and investigate errors or abuse.</li><li><strong>Support and contact-form communications:</strong> retained while the request is handled and afterward only for as long as reasonably necessary for follow-up, security, disputes, or legal obligations.</li></ul><p>When information is no longer required, it is deleted, anonymized, or removed from active use unless continued retention is required or permitted by law.</p><h2>8. Security</h2><p>We use reasonable technical and organizational safeguards, which may include encrypted network communication, access controls, restricted server access, purchase verification, app-identity checks, and abuse monitoring. No internet-connected service can be guaranteed completely secure.</p>\n<h2>9. International Transfers</h2><p>Some platform or service providers may process information outside your country, including outside the EU or EEA. Where required, transfers use an adequacy decision, standard contractual clauses, or another lawful safeguard.</p>\n<h2>10. Your Rights</h2><p>Depending on applicable law, you may request information, access, correction, deletion, restriction, objection, or portability, withdraw consent, and complain to a data-protection authority. In Sweden, the supervisory authority is Integritetsskyddsmyndigheten (IMY). These rights may be limited where continued processing is required for law, security, fraud prevention, transactions, or legal claims.</p>\n<h2 id=\"privacy-choices\">11. Privacy Choices and Deletion</h2><p>You can remove playlists in the app where available, clear app data, clear the website's stored language preference through your browser, or uninstall the app. Uninstalling does not automatically delete server-side purchase, transaction, license, fraud-prevention, or legal records.</p><p>To request access, correction, restriction, objection, or deletion, email <a href=\"mailto:info.playsat@gmail.com\">info.playsat@gmail.com</a> with the subject <strong>PlaySat TV Privacy Request</strong>. Include your platform, the device identifier or MAC-address-like identifier shown in the app where available, an approximate activation or purchase date if relevant, and a clear description of the request. Do not include playlist passwords or payment-card details.</p><p>We may request limited additional information when reasonably necessary to verify that the request concerns your own data. We will respond within the period required by applicable law.</p><div class=\"privacy-warning\">Deleting a server-side device or license record may prevent the app from recognizing an existing trial or activation. Some transaction, accounting, security, refund, fraud-prevention, and legal records may still need to be retained.</div><h2>12. Children and Parental Controls</h2><p>PlaySat TV is not specifically directed at children and does not intentionally request a child’s name, contact details, location, school information, or similar personal information. The app may include parental controls that hide or restrict groups identified as adult content. A parent or guardian is responsible for configuring these controls and supervising use.</p>\n<h2>13. Demo Mode</h2><p>The app includes legal sample content for demonstration and platform review. Demo-related license checks and technical requests may process the same limited device and diagnostic information described in this policy.</p>\n<h2>14. Third-Party Content and Services</h2><p>Third parties selected by the user may receive network information, including an Internet Protocol address, as part of the connection. PlaySat TV is not responsible for the privacy, security, legality, availability, or content practices of independent IPTV providers, playlist providers, websites, or other services.</p>\n<h2>15. Changes to This Policy</h2><p>We may update this policy when the app, our practices, laws, or platform requirements change. The current version will be published here with an updated date. Material changes may also be communicated through the app, website, or app-store listing where appropriate.</p>\n<h2>16. Contact</h2><div class=\"privacy-contact\"><strong>Data controller and developer:</strong> Playsat<br><strong>Location:</strong> Stockholm, Sweden<br><strong>Application:</strong> PlaySat TV<br><strong>Website:</strong> <a href=\"https://portal.playsattv.com\">https://portal.playsattv.com</a><br><strong>Privacy and support email:</strong> <a href=\"mailto:info.playsat@gmail.com\">info.playsat@gmail.com</a></div>\n"},"fr": {"nav_services": "Services","nav_about": "À propos","nav_contact": "Contact","nav_policy": "Politique de confidentialité","hero_title": "Politique de confidentialité","hero_desc": "Cette page explique comment PlaySat TV traite les informations relatives à l’appareil, la validation de licence, les achats, les listes de lecture, les réglages et les demandes de confidentialité.","page_title": "Politique de confidentialité de PlaySat TV","updated_label": "Dernière mise à jour :","controller_label": "Responsable du traitement et développeur :","website_label": "Site web :","support_label": "Confidentialité et assistance :","back": "Retour à Playsat","home": "Accueil","footer_policy": "Politique de confidentialité PlaySat TV","content": "\n<div class=\"privacy-note\"><strong>Important :</strong> PlaySat TV est un lecteur multimédia. L’application n’inclut, ne vend, n’héberge ni ne distribue d’abonnements IPTV, de chaînes, de films ou de séries de tiers. L’utilisateur doit uniquement employer des listes et des sources auxquelles il est légalement autorisé à accéder.</div>\n<h2>1. Champ d’application</h2><p>La présente politique de confidentialité s’applique à PlaySat TV sur les téléphones et tablettes Android, Android TV, iPhone, iPad, Apple TV (tvOS), les téléviseurs LG sous webOS, les téléviseurs Samsung sous Tizen et les autres appareils pris en charge. La disponibilité peut varier selon le pays, l’appareil et l’approbation de la boutique d’applications concernée.</p><p>Elle s’applique également, le cas échéant, aux services PlaySat TV relatifs aux périodes d’essai, à la validation des licences, à l’activation des appareils, à la vérification des achats, au contenu de démonstration, à l’assistance, au site PlaySat et aux services backend ou de sécurité.</p><p>Les fournisseurs IPTV, fournisseurs de listes de lecture, fournisseurs de contenu, sites web et autres services indépendants choisis par l’utilisateur sont régis par leurs propres conditions et politiques de confidentialité.</p><h2>2. Informations traitées</h2><h3>2.1 Listes de lecture et identifiants</h3><p>Lorsque vous ajoutez une liste ou une source, l’application peut traiter son nom, l’URL du serveur ou de la liste, le nom d’utilisateur, le mot de passe ou jeton d’accès et les autres informations de connexion fournies. Elles sont normalement conservées localement sur votre appareil et utilisées pour se connecter au fournisseur choisi.</p><p>Lorsqu’une fonctionnalité nécessite un serveur PlaySat TV, celui-ci peut traiter temporairement les données nécessaires à la demande. PlaySat TV ne vend pas ces identifiants et ne les utilise pas pour la publicité, le marketing ou le profilage.</p>\n<h3>2.2 Informations relatives à l’appareil et à la licence</h3><p>Pour les périodes d’essai, l’activation de l’appareil, la validation de la licence, la sécurité et la prévention de la fraude, nous pouvons traiter un identifiant généré par l’application, dérivé de l’appareil ou fourni par la plateforme ; le type, le modèle, le fabricant et la plateforme de l’appareil ; la version du système d’exploitation ; la version et le numéro de build de l’application ; l’identifiant du bundle ou du package ; l’état de l’essai, de la licence, de l’activation et de l’expiration ; l’heure du dernier contrôle ; l’adresse IP ; ainsi que les informations disponibles de validation de l’identité ou de la sécurité de l’application.</p><p>Un identifiant d’appareil peut être affiché dans l’application sous une forme ressemblant à une adresse MAC. Il peut être généré par PlaySat TV et ne correspond pas nécessairement à l’adresse MAC physique du réseau de l’appareil. Il sert à reconnaître l’installation ou l’appareil pour la licence et la sécurité, et non à suivre l’utilisateur entre les applications ou sites web d’autres entreprises.</p>\n<h3>2.3 Achats et activation de l’appareil</h3><p>Les achats sur iPhone, iPad et Apple TV sont traités par Apple via l’App Store et StoreKit. Les achats sur les téléphones Android, les tablettes Android et Android TV sont traités par Google via Google Play Billing.</p><p>Sur LG webOS, Samsung Tizen ou une autre plateforme prise en charge, les méthodes d’activation et de paiement disponibles peuvent varier. Lorsqu’un prestataire de paiement distinct est proposé, il traite les données de paiement et PlaySat TV reçoit uniquement les informations nécessaires pour confirmer la transaction et activer l’appareil.</p><p>PlaySat TV ne reçoit ni ne conserve votre numéro complet de carte bancaire, votre numéro de compte bancaire, ni le mot de passe de votre compte Apple ou Google.</p><p>Pour vérifier un achat et fournir une activation, nous pouvons traiter la boutique ou la plateforme, l’identifiant du produit, l’identifiant de transaction Apple ou l’identifiant de transaction d’origine, le jeton d’achat Google Play ou l’identifiant de commande lorsqu’il est disponible, une référence de transaction externe le cas échéant, la date d’achat, le résultat de la vérification, l’état du remboursement, de l’annulation, de la révocation ou de la transaction, les dates d’activation et d’expiration ainsi que l’identifiant PlaySat TV associé à l’appareil.</p><h3>2.4 Réglages locaux</h3><p>L’application peut conserver localement la langue, les favoris, la reprise de lecture, les groupes sélectionnés ou masqués, le contrôle parental, les préférences du lecteur et des sous-titres et d’autres réglages. Les informations qui restent uniquement sur votre appareil et ne nous sont pas transmises ne sont pas collectées par PlaySat TV.</p>\n<h3>2.5 Interaction et données techniques</h3><p>Nous pouvons traiter des données limitées nécessaires au fonctionnement et à la protection du service : lancements liés aux contrôles de licence, heure et type de requête, réponse du serveur, version de l’application, plateforme, résultat des contrôles de licence et de sécurité et erreurs techniques nécessaires au diagnostic.</p>\n<h3>2.6 Assistance et demandes de confidentialité</h3><p>Si vous nous contactez, nous pouvons traiter votre adresse e-mail, votre message, les pièces jointes que vous choisissez d’envoyer, les informations relatives à l’appareil ou à la transaction et les détails techniques nécessaires pour répondre à la demande. N’envoyez pas de mots de passe de listes, de mots de passe de compte Apple ou Google, de données de carte bancaire ou de documents d’identité inutiles par e-mail ordinaire.</p>\n<h3>2.7 Préférences du site web et formulaire de contact</h3><p>Le site PlaySat peut enregistrer la langue choisie dans le stockage local de votre navigateur afin que le site et la présente politique restent dans la langue sélectionnée. Cette préférence n’est pas utilisée à des fins publicitaires ou de suivi entre sites.</p><p>Si vous envoyez volontairement le formulaire de contact du site, nous pouvons traiter votre nom, votre adresse e-mail, votre message et des informations techniques limitées concernant la demande par l’intermédiaire de notre prestataire de formulaire de contact afin de vous répondre.</p>\n<h3>2.8 Informations que nous ne collectons pas intentionnellement</h3><p>Nous ne collectons pas intentionnellement les coordonnées complètes de carte bancaire ou de compte bancaire, les données de santé ou d’activité physique, les contacts du carnet d’adresses, les données biométriques, la position GPS précise, les photos ou vidéos stockées sur votre appareil, les enregistrements du microphone ou les données destinées à la publicité de tiers.</p><h2>3. Finalités</h2><ul><li>Fournir l’application et les fonctions demandées.</li><li>Charger les listes et sources choisies.</li><li>Fournir un contenu de démonstration légal.</li><li>Gérer essais, licences et activations.</li><li>Vérifier et fournir les achats intégrés.</li><li>Prévenir la fraude, l’abus et la répétition abusive des essais.</li><li>Protéger l’application, les services et les utilisateurs.</li><li>Résoudre les problèmes techniques et de compatibilité.</li><li>Répondre aux demandes d’assistance et de confidentialité.</li><li>Respecter les obligations comptables, fiscales, réglementaires et légales.</li></ul>\n<h2>4. Bases juridiques</h2><p>Lorsque le RGPD ou une loi similaire s’applique, le traitement repose sur l’exécution d’un contrat, nos intérêts légitimes en matière de sécurité et de fonctionnement fiable, une obligation légale ou le consentement lorsqu’il est requis. Le consentement peut être retiré à tout moment sans affecter les traitements antérieurs licites.</p>\n<h2>5. Partage et divulgation</h2><p>Nous ne vendons pas de données personnelles. Des informations limitées peuvent être traitées par Apple pour les achats App Store, par Google pour les achats Google Play, par un prestataire de paiement indiqué au moment du paiement lorsqu’une méthode d’activation distincte est proposée, par le fournisseur de liste ou de contenu choisi par l’utilisateur, ainsi que par des prestataires d’hébergement, de réseau, de sécurité, d’e-mail, de formulaire de contact, de diffusion de contenu ou de services techniques qui nous aident à exploiter et à protéger PlaySat TV.</p><p>Ces prestataires ne peuvent traiter les informations que dans la mesure nécessaire à la fourniture de leurs services ou au respect de la loi. Nous attendons des prestataires agissant pour notre compte qu’ils appliquent des mesures appropriées de confidentialité et de sécurité. Des informations peuvent également être divulguées lorsque la loi l’exige, pour protéger les utilisateurs ou le service, prévenir la fraude ou constater, exercer ou défendre des droits en justice.</p><h2>6. Publicité et suivi</h2><p>PlaySat TV n’affiche pas de publicité de tiers, n’utilise pas les données personnelles pour la publicité ciblée, ne vend pas de données à des courtiers et ne combine pas ses données avec des données tierces pour suivre les utilisateurs dans les applications ou sites d’autres sociétés.</p>\n<h2>7. Conservation des données</h2><ul><li><strong>Listes locales, réglages de l’application et préférence linguistique du site :</strong> conservés jusqu’à leur suppression, l’effacement des données de l’application ou du navigateur, ou la désinstallation, sous réserve du comportement de sauvegarde de la plateforme.</li><li><strong>Dossiers d’appareil et de licence :</strong> conservés pendant la durée de l’essai, de la licence ou de l’activation, puis uniquement aussi longtemps que raisonnablement nécessaire pour la sécurité, la prévention de la fraude, les litiges, les droits en justice ou les obligations légales.</li><li><strong>Dossiers d’achat et de transaction :</strong> conservés aussi longtemps que nécessaire pour vérifier et fournir l’activation, puis lorsque cela est requis pour les remboursements, la comptabilité, la fiscalité, la prévention de la fraude, les litiges ou d’autres obligations légales.</li><li><strong>Journaux serveur et de sécurité :</strong> conservés uniquement pendant la période raisonnablement nécessaire pour protéger et exploiter le service et enquêter sur les erreurs ou abus.</li><li><strong>Communications d’assistance et de formulaire de contact :</strong> conservées pendant le traitement de la demande, puis uniquement aussi longtemps que raisonnablement nécessaire pour le suivi, la sécurité, les litiges ou les obligations légales.</li></ul><p>Lorsque les informations ne sont plus nécessaires, elles sont supprimées, anonymisées ou retirées de l’utilisation active, sauf si leur conservation est requise ou autorisée par la loi.</p><h2>8. Sécurité</h2><p>Nous appliquons des mesures techniques et organisationnelles raisonnables, pouvant inclure le chiffrement des communications, des contrôles d’accès, un accès serveur limité, la vérification des achats, les contrôles d’identité de l’application et la surveillance des abus. Aucun service connecté ne peut être garanti totalement sûr.</p>\n<h2>9. Transferts internationaux</h2><p>Certains fournisseurs peuvent traiter des données hors de votre pays, y compris hors de l’UE ou de l’EEE. Lorsque nécessaire, nous utilisons une décision d’adéquation, des clauses contractuelles types ou une autre garantie légale.</p>\n<h2>10. Vos droits</h2><p>Selon la loi applicable, vous pouvez demander information, accès, rectification, effacement, limitation, opposition ou portabilité, retirer votre consentement et saisir une autorité de contrôle. En Suède, l’autorité est Integritetsskyddsmyndigheten (IMY). Ces droits peuvent être limités pour respecter la loi, la sécurité, la fraude, une transaction ou une action en justice.</p>\n<h2 id=\"privacy-choices\">11. Choix de confidentialité et suppression</h2><p>Vous pouvez supprimer des listes dans l’application lorsque cette fonction est disponible, effacer les données de l’application, supprimer la préférence linguistique du site depuis votre navigateur ou désinstaller l’application. La désinstallation ne supprime pas automatiquement les dossiers serveur relatifs aux achats, transactions, licences, prévention de la fraude ou obligations légales.</p><p>Pour demander l’accès, la rectification, la limitation, l’opposition ou la suppression, écrivez à <a href=\"mailto:info.playsat@gmail.com\">info.playsat@gmail.com</a> avec l’objet <strong>PlaySat TV Privacy Request</strong>. Indiquez votre plateforme, l’identifiant d’appareil ou l’identifiant ressemblant à une adresse MAC affiché dans l’application lorsqu’il est disponible, une date approximative d’activation ou d’achat si elle est pertinente, et une description claire de la demande. N’incluez pas de mot de passe de liste ni de données de carte bancaire.</p><p>Nous pouvons demander des informations supplémentaires limitées lorsqu’elles sont raisonnablement nécessaires pour vérifier que la demande concerne vos propres données. Nous répondrons dans le délai prévu par la loi applicable.</p><div class=\"privacy-warning\">La suppression d’un dossier serveur relatif à l’appareil ou à la licence peut empêcher l’application de reconnaître un essai ou une activation existante. Certains dossiers de transaction, comptabilité, sécurité, remboursement, prévention de la fraude ou obligations légales peuvent néanmoins devoir être conservés.</div><h2>12. Enfants et contrôle parental</h2><p>PlaySat TV ne vise pas spécifiquement les enfants et ne leur demande pas intentionnellement nom, coordonnées, localisation, école ou données similaires. L’application peut masquer ou limiter des groupes identifiés comme contenu adulte. Le parent ou tuteur est responsable de la configuration et de la supervision.</p>\n<h2>13. Mode démo</h2><p>L’application contient des exemples légaux pour la démonstration et l’examen par les plateformes. Les contrôles de licence et requêtes techniques du mode démo peuvent traiter les mêmes données limitées décrites ici.</p>\n<h2>14. Contenu et services tiers</h2><p>Les tiers choisis par l’utilisateur peuvent recevoir des informations réseau, notamment l’adresse IP. PlaySat TV n’est pas responsable des pratiques de confidentialité, de sécurité, de légalité, de disponibilité ou de contenu des fournisseurs indépendants.</p>\n<h2>15. Modifications</h2><p>Nous pouvons mettre à jour cette politique lorsque l’application, nos pratiques, la loi ou les exigences des plateformes changent. La version actuelle sera publiée ici avec une nouvelle date et les changements importants pourront être annoncés dans l’application, sur le site ou dans la fiche de l’App Store.</p>\n<h2>16. Contact</h2><div class=\"privacy-contact\"><strong>Responsable du traitement et développeur :</strong> Playsat<br><strong>Lieu :</strong> Stockholm, Suède<br><strong>Application :</strong> PlaySat TV<br><strong>Site web :</strong> <a href=\"https://portal.playsattv.com\">https://portal.playsattv.com</a><br><strong>E-mail confidentialité et assistance :</strong> <a href=\"mailto:info.playsat@gmail.com\">info.playsat@gmail.com</a></div>\n"},"es": {"nav_services": "Servicios","nav_about": "Sobre nosotros","nav_contact": "Contacto","nav_policy": "Política de privacidad","hero_title": "Política de privacidad","hero_desc": "Esta página explica cómo PlaySat TV trata la información del dispositivo, la validación de licencias, las compras, las listas de reproducción, los ajustes y las solicitudes de privacidad.","page_title": "Política de privacidad de PlaySat TV","updated_label": "Última actualización:","controller_label": "Responsable del tratamiento y desarrollador:","website_label": "Sitio web:","support_label": "Privacidad y soporte:","back": "Volver a Playsat","home": "Inicio","footer_policy": "Política de privacidad de PlaySat TV","content": "\n<div class=\"privacy-note\"><strong>Importante:</strong> PlaySat TV es un reproductor multimedia. La aplicación no incluye, vende, aloja ni distribuye suscripciones IPTV, canales, películas o series de terceros. El usuario solo debe utilizar listas y fuentes a las que tenga autorización legal para acceder.</div>\n<h2>1. Ámbito</h2><p>Esta Política de Privacidad se aplica a PlaySat TV en teléfonos y tabletas Android, Android TV, iPhone, iPad, Apple TV (tvOS), televisores LG con webOS, televisores Samsung con Tizen y otros dispositivos compatibles. La disponibilidad puede variar según el país, el dispositivo y la aprobación de la tienda de aplicaciones correspondiente.</p><p>También se aplica, cuando corresponda, a los servicios de PlaySat TV para pruebas, validación de licencias, activación de dispositivos, verificación de compras, contenido de demostración, atención al cliente, el sitio web de PlaySat y los servicios de backend o seguridad.</p><p>Los proveedores IPTV, proveedores de listas, proveedores de contenido, sitios web y otros servicios independientes elegidos por el usuario se rigen por sus propios términos y políticas de privacidad.</p><h2>2. Información que tratamos</h2><h3>2.1 Listas y credenciales</h3><p>Al añadir una lista o fuente, la aplicación puede tratar su nombre, URL del servidor o lista, nombre de usuario, contraseña o token y otros datos de conexión facilitados. Normalmente se guardan localmente en el dispositivo y se usan para conectar con el proveedor elegido.</p><p>Cuando una función necesita un servidor de PlaySat TV, este puede tratar temporalmente los datos necesarios para completar la solicitud. PlaySat TV no vende las credenciales ni las utiliza para publicidad, marketing o elaboración de perfiles.</p>\n<h3>2.2 Información del dispositivo y la licencia</h3><p>Para pruebas, activación del dispositivo, validación de licencias, seguridad y prevención del fraude, podemos tratar un identificador generado por la aplicación, derivado del dispositivo o facilitado por la plataforma; tipo, modelo, fabricante y plataforma del dispositivo; versión del sistema operativo; versión y número de compilación de la aplicación; identificador del paquete o bundle; estado de prueba, licencia, activación y caducidad; hora de la última comprobación; dirección IP; e información disponible de validación de identidad o seguridad de la aplicación.</p><p>Un identificador de dispositivo puede mostrarse en la aplicación con un formato similar a una dirección MAC. Puede ser generado por PlaySat TV y no tiene por qué corresponder a la dirección MAC física de red del dispositivo. Se utiliza para reconocer la instalación o el dispositivo con fines de licencia y seguridad, no para seguir al usuario entre aplicaciones o sitios web de otras empresas.</p>\n<h3>2.3 Compras y activación del dispositivo</h3><p>Las compras en iPhone, iPad y Apple TV son procesadas por Apple mediante App Store y StoreKit. Las compras en teléfonos Android, tabletas Android y Android TV son procesadas por Google mediante Google Play Billing.</p><p>En LG webOS, Samsung Tizen u otra plataforma compatible, los métodos de activación y pago disponibles pueden variar. Cuando se ofrece un proveedor de pago independiente, dicho proveedor procesa los datos de pago y PlaySat TV recibe únicamente la información necesaria para confirmar la transacción y activar el dispositivo.</p><p>PlaySat TV no recibe ni almacena el número completo de tu tarjeta, número de cuenta bancaria ni la contraseña de tu cuenta de Apple o Google.</p><p>Para verificar una compra y proporcionar una activación, podemos tratar la tienda o plataforma, el identificador del producto, el identificador de transacción de Apple o el identificador original, el token de compra de Google Play o el identificador de pedido cuando esté disponible, una referencia de transacción externa cuando corresponda, la fecha de compra, el resultado de verificación, el estado de reembolso, cancelación, revocación o transacción, las fechas de activación y caducidad y el identificador de dispositivo de PlaySat TV asociado.</p><h3>2.4 Ajustes locales</h3><p>La aplicación puede guardar localmente idioma, favoritos, continuar viendo, grupos seleccionados u ocultos, control parental, preferencias del reproductor y subtítulos y otros ajustes. Lo que permanece únicamente en tu dispositivo y no se transmite no es recopilado por PlaySat TV.</p>\n<h3>2.5 Interacción y datos técnicos</h3><p>Podemos tratar datos limitados necesarios para operar y proteger el servicio: inicios asociados a comprobaciones, hora y tipo de solicitud, respuesta, versión, plataforma, resultados de licencia y seguridad y errores técnicos necesarios para diagnosticar funciones.</p>\n<h3>2.6 Soporte y solicitudes de privacidad</h3><p>Si te pones en contacto con nosotros, podemos tratar tu dirección de correo electrónico, mensaje, archivos adjuntos que decidas enviar, información del dispositivo o de la transacción y datos técnicos necesarios para responder. No envíes contraseñas de listas, contraseñas de cuentas Apple o Google, datos de tarjeta ni documentos de identidad innecesarios por correo ordinario.</p>\n<h3>2.7 Preferencias del sitio web y formulario de contacto</h3><p>El sitio web de PlaySat puede guardar el idioma seleccionado en el almacenamiento local del navegador para que el sitio y esta Política de Privacidad permanezcan en el idioma elegido. Esta preferencia no se utiliza para publicidad ni seguimiento entre sitios.</p><p>Si envías voluntariamente el formulario de contacto del sitio, podemos tratar tu nombre, dirección de correo electrónico, mensaje e información técnica limitada de la solicitud a través de nuestro proveedor del formulario de contacto con el fin de responderte.</p>\n<h3>2.8 Información que no recopilamos intencionadamente</h3><p>No recopilamos intencionadamente datos completos de tarjetas o cuentas bancarias, datos de salud o actividad física, contactos de la libreta de direcciones, datos biométricos, ubicación GPS precisa, fotos o vídeos almacenados en tu dispositivo, grabaciones del micrófono ni datos destinados a publicidad de terceros.</p><h2>3. Finalidades</h2><ul><li>Proporcionar la aplicación y las funciones solicitadas.</li><li>Cargar listas y fuentes elegidas.</li><li>Ofrecer contenido legal de demostración.</li><li>Gestionar pruebas, licencias y activaciones.</li><li>Verificar y entregar compras.</li><li>Prevenir fraude, abuso y repetición indebida de pruebas.</li><li>Proteger la aplicación, los servicios y los usuarios.</li><li>Resolver problemas técnicos y de compatibilidad.</li><li>Responder a soporte y privacidad.</li><li>Cumplir obligaciones contables, fiscales, regulatorias y legales.</li></ul>\n<h2>4. Bases jurídicas</h2><p>Cuando se aplica el RGPD o una ley similar, el tratamiento se basa en la ejecución de un contrato, nuestros intereses legítimos de seguridad y funcionamiento fiable, obligaciones legales o consentimiento cuando sea necesario. El consentimiento puede retirarse sin afectar al tratamiento anterior lícito.</p>\n<h2>5. Cesión y divulgación</h2><p>No vendemos datos personales. Información limitada puede ser tratada por Apple para compras en App Store, por Google para compras en Google Play, por un proveedor de pago indicado en el proceso de compra cuando se ofrece un método de activación independiente, por el proveedor de lista o contenido elegido por el usuario y por proveedores de alojamiento, red, seguridad, correo electrónico, formularios de contacto, distribución de contenido o servicios técnicos que nos ayudan a operar y proteger PlaySat TV.</p><p>Estos proveedores solo pueden tratar la información en la medida necesaria para prestar sus servicios o cumplir la ley. Esperamos que los proveedores que actúan por nuestra cuenta apliquen medidas adecuadas de confidencialidad y seguridad. También podemos divulgar información cuando lo exija la ley, para proteger a los usuarios o al servicio, prevenir el fraude o formular, ejercer o defender reclamaciones legales.</p><h2>6. Publicidad y seguimiento</h2><p>PlaySat TV no muestra publicidad de terceros, no utiliza datos personales para publicidad dirigida, no vende datos a intermediarios y no combina sus datos con datos de terceros para seguir a usuarios entre aplicaciones o sitios de otras empresas.</p>\n<h2>7. Conservación de datos</h2><ul><li><strong>Listas locales, ajustes de la aplicación y preferencia de idioma del sitio:</strong> se conservan hasta que los elimines, borres los datos de la aplicación o del navegador o desinstales la aplicación, sujeto al comportamiento de copia de seguridad de la plataforma.</li><li><strong>Registros de dispositivo y licencia:</strong> se conservan mientras una prueba, licencia o activación esté activa y después solo durante el tiempo razonablemente necesario para seguridad, prevención del fraude, disputas, reclamaciones legales u obligaciones legales.</li><li><strong>Registros de compra y transacción:</strong> se conservan durante el tiempo necesario para verificar y proporcionar la activación y posteriormente cuando se requiera para reembolsos, contabilidad, impuestos, prevención del fraude, disputas u otras obligaciones legales.</li><li><strong>Registros del servidor y de seguridad:</strong> se conservan únicamente durante el período razonablemente necesario para proteger y operar el servicio e investigar errores o abusos.</li><li><strong>Comunicaciones de soporte y formularios de contacto:</strong> se conservan mientras se atiende la solicitud y después solo durante el tiempo razonablemente necesario para seguimiento, seguridad, disputas u obligaciones legales.</li></ul><p>Cuando la información deja de ser necesaria, se elimina, anonimiza o retira del uso activo, salvo que su conservación sea exigida o permitida por la ley.</p><h2>8. Seguridad</h2><p>Aplicamos medidas técnicas y organizativas razonables, como comunicaciones cifradas, controles de acceso, acceso restringido al servidor, verificación de compras, controles de identidad de la aplicación y vigilancia de abusos. Ningún servicio conectado puede garantizar seguridad total.</p>\n<h2>9. Transferencias internacionales</h2><p>Algunos proveedores pueden tratar datos fuera de tu país, incluso fuera de la UE o del EEE. Cuando sea necesario se utiliza una decisión de adecuación, cláusulas contractuales tipo u otra garantía legal.</p>\n<h2>10. Tus derechos</h2><p>Según la ley aplicable, puedes solicitar información, acceso, rectificación, supresión, limitación, oposición o portabilidad, retirar el consentimiento y reclamar ante una autoridad. En Suecia es Integritetsskyddsmyndigheten (IMY). Estos derechos pueden limitarse por ley, seguridad, fraude, transacciones o reclamaciones.</p>\n<h2 id=\"privacy-choices\">11. Opciones de privacidad y eliminación</h2><p>Puedes eliminar listas en la aplicación cuando esa opción esté disponible, borrar los datos de la aplicación, eliminar desde el navegador la preferencia de idioma guardada en el sitio o desinstalar la aplicación. La desinstalación no elimina automáticamente los registros del servidor relacionados con compras, transacciones, licencias, prevención del fraude u obligaciones legales.</p><p>Para solicitar acceso, corrección, limitación, oposición o eliminación, escribe a <a href=\"mailto:info.playsat@gmail.com\">info.playsat@gmail.com</a> con el asunto <strong>PlaySat TV Privacy Request</strong>. Indica tu plataforma, el identificador de dispositivo o identificador similar a una dirección MAC mostrado en la aplicación cuando esté disponible, una fecha aproximada de activación o compra si es relevante y una descripción clara de la solicitud. No incluyas contraseñas de listas ni datos de tarjeta.</p><p>Podemos solicitar información adicional limitada cuando sea razonablemente necesaria para verificar que la solicitud se refiere a tus propios datos. Responderemos dentro del plazo exigido por la ley aplicable.</p><div class=\"privacy-warning\">Eliminar un registro de dispositivo o licencia del servidor puede impedir que la aplicación reconozca una prueba o activación existente. Algunos registros de transacción, contabilidad, seguridad, reembolso, prevención del fraude u obligaciones legales pueden tener que conservarse.</div><h2>12. Menores y control parental</h2><p>PlaySat TV no está dirigida específicamente a menores y no solicita intencionadamente nombre, contacto, ubicación, colegio u otros datos similares de un menor. La aplicación puede ocultar o restringir grupos identificados como contenido adulto. El padre, madre o tutor es responsable de configurar y supervisar el uso.</p>\n<h2>13. Modo demo</h2><p>La aplicación incluye contenido de muestra legal para demostración y revisión de plataformas. Las comprobaciones y solicitudes técnicas del modo demo pueden tratar los mismos datos limitados descritos aquí.</p>\n<h2>14. Contenido y servicios de terceros</h2><p>Los terceros elegidos pueden recibir información de red, incluida la dirección IP. PlaySat TV no responde de las prácticas de privacidad, seguridad, legalidad, disponibilidad o contenido de proveedores independientes.</p>\n<h2>15. Cambios</h2><p>Podemos actualizar esta política cuando cambien la aplicación, nuestras prácticas, la ley o los requisitos de plataforma. La versión actual se publicará aquí con nueva fecha y los cambios importantes podrán comunicarse en la aplicación, sitio web o ficha de la tienda.</p>\n<h2>16. Contacto</h2><div class=\"privacy-contact\"><strong>Responsable del tratamiento y desarrollador:</strong> Playsat<br><strong>Ubicación:</strong> Estocolmo, Suecia<br><strong>Aplicación:</strong> PlaySat TV<br><strong>Sitio web:</strong> <a href=\"https://portal.playsattv.com\">https://portal.playsattv.com</a><br><strong>Correo de privacidad y soporte:</strong> <a href=\"mailto:info.playsat@gmail.com\">info.playsat@gmail.com</a></div>\n"},"de": {"nav_services": "Dienstleistungen","nav_about": "Über uns","nav_contact": "Kontakt","nav_policy": "Datenschutzerklärung","hero_title": "Datenschutzerklärung","hero_desc": "Diese Seite erklärt, wie PlaySat TV Geräteinformationen, Lizenzprüfungen, Käufe, Wiedergabelistendaten, App-Einstellungen und Datenschutzanfragen verarbeitet.","page_title": "Datenschutzerklärung für PlaySat TV","updated_label": "Zuletzt aktualisiert:","controller_label": "Verantwortlicher und Entwickler:","website_label": "Website:","support_label": "Datenschutz und Support:","back": "Zurück zu Playsat","home": "Startseite","footer_policy": "PlaySat TV Datenschutzerklärung","content": "\n<div class=\"privacy-note\"><strong>Wichtig:</strong> PlaySat TV ist ein Mediaplayer. Die App enthält, verkauft, hostet oder verbreitet keine IPTV-Abonnements, Sender, Filme oder Serien Dritter. Nutzer dürfen nur Wiedergabelisten und Quellen verwenden, zu deren Nutzung sie rechtlich berechtigt sind.</div>\n<h2>1. Geltungsbereich</h2><p>Diese Datenschutzerklärung gilt für PlaySat TV auf Android-Smartphones und -Tablets, Android TV, iPhone, iPad, Apple TV (tvOS), LG Smart TVs mit webOS, Samsung Smart TVs mit Tizen und weiteren unterstützten Geräten. Die Verfügbarkeit kann je nach Land, Gerät und Genehmigung des jeweiligen App-Stores variieren.</p><p>Sie gilt außerdem, soweit relevant, für PlaySat-TV-Dienste für Testzeiträume, Lizenzprüfung, Geräteaktivierung, Kaufprüfung, Demo-Inhalte, Kundensupport, die PlaySat-Website sowie Backend- und Sicherheitsdienste.</p><p>Unabhängige IPTV-Anbieter, Wiedergabelistenanbieter, Inhaltsanbieter, Websites und andere vom Nutzer gewählte Dienste unterliegen ihren eigenen Bedingungen und Datenschutzerklärungen.</p><h2>2. Verarbeitete Informationen</h2><h3>2.1 Wiedergabelisten und Zugangsdaten</h3><p>Wenn Sie eine Liste oder Quelle hinzufügen, kann die App Name, Server- oder Listen-URL, Benutzername, Passwort oder Token und weitere Verbindungsdaten verarbeiten. Diese werden normalerweise lokal auf Ihrem Gerät gespeichert und zur Verbindung mit dem gewählten Anbieter verwendet.</p><p>Benötigt eine Funktion einen PlaySat-TV-Server, kann dieser die für die Anfrage erforderlichen Daten vorübergehend verarbeiten. PlaySat TV verkauft Zugangsdaten nicht und nutzt sie nicht für Werbung, Marketing oder Profilbildung.</p>\n<h3>2.2 Geräte- und Lizenzinformationen</h3><p>Für Testzeiträume, Geräteaktivierung, Lizenzprüfung, Sicherheit und Betrugsprävention können wir eine von der App erzeugte, vom Gerät abgeleitete oder von der Plattform bereitgestellte Gerätekennung; Gerätetyp, Modell, Hersteller und Plattform; Betriebssystemversion; App-Version und Buildnummer; Bundle- oder Paketkennung; Test-, Lizenz-, Aktivierungs- und Ablaufstatus; Zeitpunkt der letzten Prüfung; IP-Adresse sowie verfügbare App-Identitäts- oder Sicherheitsprüfdaten verarbeiten.</p><p>Eine Gerätekennung kann in der App in einem MAC-adressähnlichen Format angezeigt werden. Sie kann von PlaySat TV erzeugt werden und muss nicht der physischen Netzwerk-MAC-Adresse des Geräts entsprechen. Sie dient dazu, die App-Installation oder das Gerät für Lizenz- und Sicherheitszwecke zu erkennen, nicht zur Verfolgung des Nutzers über Apps oder Websites anderer Unternehmen hinweg.</p>\n<h3>2.3 Käufe und Geräteaktivierung</h3><p>Käufe auf iPhone, iPad und Apple TV werden von Apple über den App Store und StoreKit verarbeitet. Käufe auf Android-Smartphones, Android-Tablets und Android TV werden von Google über Google Play Billing verarbeitet.</p><p>Auf LG webOS, Samsung Tizen oder einer anderen unterstützten Plattform können die verfügbaren Aktivierungs- und Zahlungsmethoden abweichen. Wird ein gesonderter Zahlungsdienst angeboten, verarbeitet dieser die Zahlungsdaten, während PlaySat TV nur die Informationen erhält, die zur Bestätigung der Transaktion und Aktivierung des Geräts erforderlich sind.</p><p>PlaySat TV erhält oder speichert weder Ihre vollständige Kartennummer noch Ihre Bankkontonummer oder das Passwort Ihres Apple- oder Google-Kontos.</p><p>Zur Prüfung eines Kaufs und Bereitstellung einer Aktivierung können wir Store oder Plattform, Produktkennung, Apple-Transaktionskennung oder ursprüngliche Transaktionskennung, Google-Play-Kauftoken oder Bestellkennung soweit verfügbar, eine externe Transaktionsreferenz soweit anwendbar, Kaufdatum, Prüfergebnis, Erstattungs-, Kündigungs-, Widerrufs- oder Transaktionsstatus, Aktivierungs- und Ablaufdatum sowie die zugeordnete PlaySat-TV-Gerätekennung verarbeiten.</p><h3>2.4 Lokale Einstellungen</h3><p>Die App kann Sprache, Favoriten, Wiedergabefortschritt, ausgewählte oder ausgeblendete Gruppen, Jugendschutz, Player- und Untertiteleinstellungen und weitere Einstellungen lokal speichern. Daten, die nur auf Ihrem Gerät verbleiben und nicht übertragen werden, werden von PlaySat TV nicht erhoben.</p>\n<h3>2.5 Nutzung und technische Daten</h3><p>Wir können begrenzte Daten verarbeiten, die für Betrieb und Schutz erforderlich sind: Starts im Zusammenhang mit Lizenzprüfungen, Zeit und Art einer Anfrage, Serverantwort, App-Version, Plattform, Lizenz- und Sicherheitsprüfergebnisse sowie technische Fehler zur Diagnose.</p>\n<h3>2.6 Support- und Datenschutzanfragen</h3><p>Wenn Sie uns kontaktieren, können wir Ihre E-Mail-Adresse, Nachricht, freiwillig übermittelte Anhänge, Geräte- oder Transaktionsinformationen und technische Angaben verarbeiten, die zur Beantwortung der Anfrage erforderlich sind. Senden Sie keine Wiedergabelistenpasswörter, Passwörter von Apple- oder Google-Konten, Kartendaten oder unnötige Ausweisdokumente per normaler E-Mail.</p>\n<h3>2.7 Website-Einstellungen und Kontaktformular</h3><p>Die PlaySat-Website kann die ausgewählte Sprache im lokalen Speicher Ihres Browsers speichern, damit die Website und diese Datenschutzerklärung in der gewählten Sprache angezeigt bleiben. Diese Einstellung wird nicht für Werbung oder websiteübergreifendes Tracking verwendet.</p><p>Wenn Sie freiwillig das Kontaktformular der Website absenden, können wir Ihren Namen, Ihre E-Mail-Adresse, Ihre Nachricht und begrenzte technische Informationen zur Anfrage über unseren Kontaktformular-Dienstleister verarbeiten, um Ihre Anfrage zu beantworten.</p>\n<h3>2.8 Informationen, die wir nicht absichtlich erheben</h3><p>Wir erheben nicht absichtlich vollständige Karten- oder Bankkontodaten, Gesundheits- oder Fitnessdaten, Adressbuchkontakte, biometrische Daten, genaue GPS-Standorte, auf Ihrem Gerät gespeicherte Fotos oder Videos, Mikrofonaufnahmen oder Daten für Drittwerbung.</p><h2>3. Zwecke</h2><ul><li>App und angeforderte Funktionen bereitstellen.</li><li>Gewählte Listen und Medienquellen laden.</li><li>Rechtmäßige Demo-Inhalte bereitstellen.</li><li>Tests, Lizenzen und Aktivierungen verwalten.</li><li>In-App-Käufe prüfen und bereitstellen.</li><li>Betrug, Missbrauch und wiederholten Testmissbrauch verhindern.</li><li>App, Dienste und Nutzer schützen.</li><li>Technische und Kompatibilitätsprobleme beheben.</li><li>Support- und Datenschutzanfragen beantworten.</li><li>Buchhaltungs-, Steuer-, Behörden- und Rechtspflichten erfüllen.</li></ul>\n<h2>4. Rechtsgrundlagen</h2><p>Soweit DSGVO oder ähnliche Gesetze gelten, beruht die Verarbeitung auf Vertragserfüllung, unseren berechtigten Interessen an Sicherheit und zuverlässigem Betrieb, rechtlichen Verpflichtungen oder Einwilligung, wenn diese erforderlich ist. Eine Einwilligung kann jederzeit widerrufen werden, ohne frühere rechtmäßige Verarbeitung zu berühren.</p>\n<h2>5. Weitergabe und Offenlegung</h2><p>Wir verkaufen keine personenbezogenen Daten. Begrenzte Informationen können von Apple für App-Store-Käufe, von Google für Google-Play-Käufe, von einem beim Bezahlvorgang genannten Zahlungsdienst bei einer gesonderten Aktivierungsmethode, vom vom Nutzer gewählten Wiedergabelisten- oder Inhaltsanbieter sowie von Hosting-, Netzwerk-, Sicherheits-, E-Mail-, Kontaktformular-, Content-Delivery- oder technischen Dienstleistern verarbeitet werden, die uns beim Betrieb und Schutz von PlaySat TV unterstützen.</p><p>Diese Dienstleister dürfen Informationen nur in dem Umfang verarbeiten, der zur Erbringung ihrer Dienste oder zur Einhaltung gesetzlicher Pflichten erforderlich ist. Von Dienstleistern, die in unserem Auftrag handeln, erwarten wir angemessene Vertraulichkeits- und Sicherheitsmaßnahmen. Informationen können außerdem offengelegt werden, wenn dies gesetzlich vorgeschrieben ist, zum Schutz von Nutzern oder des Dienstes, zur Betrugsprävention oder zur Begründung, Ausübung oder Verteidigung rechtlicher Ansprüche.</p><h2>6. Werbung und Tracking</h2><p>PlaySat TV zeigt keine Drittwerbung, nutzt Daten nicht für zielgerichtete Werbung, verkauft keine Daten an Datenhändler und kombiniert keine PlaySat-TV-Daten mit Drittdaten zur Verfolgung über Apps oder Websites anderer Unternehmen.</p>\n<h2>7. Speicherdauer</h2><ul><li><strong>Lokale Wiedergabelisten, App-Einstellungen und Website-Sprachwahl:</strong> bis Sie sie löschen, App- oder Browserdaten entfernen oder die App deinstallieren, vorbehaltlich des Sicherungsverhaltens der Plattform.</li><li><strong>Geräte- und Lizenzdatensätze:</strong> während ein Test, eine Lizenz oder Aktivierung aktiv ist und danach nur so lange, wie dies vernünftigerweise für Sicherheit, Betrugsprävention, Streitigkeiten, Rechtsansprüche oder gesetzliche Pflichten erforderlich ist.</li><li><strong>Kauf- und Transaktionsdatensätze:</strong> solange dies zur Prüfung und Bereitstellung der Aktivierung erforderlich ist und danach, soweit für Erstattungen, Buchhaltung, Steuern, Betrugsprävention, Streitigkeiten oder andere gesetzliche Pflichten notwendig.</li><li><strong>Server- und Sicherheitsprotokolle:</strong> nur für den Zeitraum, der vernünftigerweise zum Schutz und Betrieb des Dienstes sowie zur Untersuchung von Fehlern oder Missbrauch erforderlich ist.</li><li><strong>Support- und Kontaktformular-Kommunikation:</strong> während der Bearbeitung der Anfrage und danach nur so lange, wie dies vernünftigerweise für Nachverfolgung, Sicherheit, Streitigkeiten oder gesetzliche Pflichten erforderlich ist.</li></ul><p>Wenn Informationen nicht mehr benötigt werden, werden sie gelöscht, anonymisiert oder aus der aktiven Nutzung entfernt, sofern eine weitere Speicherung nicht gesetzlich vorgeschrieben oder erlaubt ist.</p><h2>8. Sicherheit</h2><p>Wir setzen angemessene technische und organisatorische Maßnahmen ein, etwa verschlüsselte Kommunikation, Zugriffskontrollen, beschränkten Serverzugang, Kaufprüfung, App-Identitätsprüfungen und Missbrauchsüberwachung. Vollständige Sicherheit kann bei keinem Internetdienst garantiert werden.</p>\n<h2>9. Internationale Übermittlungen</h2><p>Anbieter können Daten außerhalb Ihres Landes, auch außerhalb EU/EWR, verarbeiten. Erforderlichenfalls werden Angemessenheitsbeschlüsse, Standardvertragsklauseln oder andere rechtmäßige Garantien genutzt.</p>\n<h2>10. Ihre Rechte</h2><p>Je nach Recht können Sie Information, Auskunft, Berichtigung, Löschung, Einschränkung, Widerspruch oder Übertragbarkeit verlangen, Einwilligung widerrufen und sich bei einer Behörde beschweren. In Schweden ist dies Integritetsskyddsmyndigheten (IMY). Rechte können wegen Gesetz, Sicherheit, Betrug, Transaktionen oder Rechtsansprüchen eingeschränkt sein.</p>\n<h2 id=\"privacy-choices\">11. Datenschutzoptionen und Löschung</h2><p>Sie können Wiedergabelisten in der App entfernen, sofern die Funktion verfügbar ist, App-Daten löschen, die auf der Website gespeicherte Sprachwahl über den Browser entfernen oder die App deinstallieren. Eine Deinstallation löscht serverseitige Kauf-, Transaktions-, Lizenz-, Betrugspräventions- oder Rechtsdatensätze nicht automatisch.</p><p>Für Auskunft, Berichtigung, Einschränkung, Widerspruch oder Löschung schreiben Sie an <a href=\"mailto:info.playsat@gmail.com\">info.playsat@gmail.com</a> mit dem Betreff <strong>PlaySat TV Privacy Request</strong>. Nennen Sie Ihre Plattform, die in der App angezeigte Gerätekennung oder MAC-adressähnliche Kennung, soweit vorhanden, ein ungefähres Aktivierungs- oder Kaufdatum, falls relevant, und eine klare Beschreibung der Anfrage. Senden Sie keine Wiedergabelistenpasswörter oder Kartendaten.</p><p>Wir können begrenzte zusätzliche Informationen anfordern, wenn dies vernünftigerweise erforderlich ist, um zu prüfen, dass sich die Anfrage auf Ihre eigenen Daten bezieht. Wir antworten innerhalb der nach geltendem Recht vorgeschriebenen Frist.</p><div class=\"privacy-warning\">Die Löschung eines serverseitigen Geräte- oder Lizenzdatensatzes kann dazu führen, dass die App einen bestehenden Test oder eine Aktivierung nicht mehr erkennt. Bestimmte Transaktions-, Buchhaltungs-, Sicherheits-, Erstattungs-, Betrugspräventions- und Rechtsdatensätze müssen möglicherweise weiterhin gespeichert werden.</div><h2>12. Kinder und Jugendschutz</h2><p>PlaySat TV richtet sich nicht speziell an Kinder und fordert nicht absichtlich Namen, Kontaktdaten, Standort, Schule oder ähnliche Daten von Kindern an. Die App kann Gruppen mit Erwachseneninhalt ausblenden oder beschränken. Eltern oder Erziehungsberechtigte sind für Einrichtung und Aufsicht verantwortlich.</p>\n<h2>13. Demo-Modus</h2><p>Die App enthält rechtmäßige Beispielinhalte für Demonstration und Plattformprüfung. Lizenzprüfungen und technische Anfragen im Demo-Modus können dieselben begrenzten Daten wie hier beschrieben verarbeiten.</p>\n<h2>14. Drittinhalte und Dienste</h2><p>Vom Nutzer gewählte Dritte können Netzwerkdaten einschließlich IP-Adresse erhalten. PlaySat TV ist nicht für Datenschutz, Sicherheit, Rechtmäßigkeit, Verfügbarkeit oder Inhalte unabhängiger Anbieter verantwortlich.</p>\n<h2>15. Änderungen</h2><p>Wir können diese Erklärung ändern, wenn sich App, Verfahren, Gesetze oder Plattformanforderungen ändern. Die aktuelle Fassung wird hier mit neuem Datum veröffentlicht; wesentliche Änderungen können in App, Website oder Store-Eintrag mitgeteilt werden.</p>\n<h2>16. Kontakt</h2><div class=\"privacy-contact\"><strong>Verantwortlicher und Entwickler:</strong> Playsat<br><strong>Standort:</strong> Stockholm, Schweden<br><strong>Anwendung:</strong> PlaySat TV<br><strong>Website:</strong> <a href=\"https://portal.playsattv.com\">https://portal.playsattv.com</a><br><strong>Datenschutz- und Support-E-Mail:</strong> <a href=\"mailto:info.playsat@gmail.com\">info.playsat@gmail.com</a></div>\n"},"tr": {"nav_services": "Hizmetler","nav_about": "Hakkımızda","nav_contact": "İletişim","nav_policy": "Gizlilik Politikası","hero_title": "Gizlilik Politikası","hero_desc": "Bu sayfa, PlaySat TV’nin cihaz bilgilerini, lisans doğrulamasını, satın alımları, oynatma listesi bilgilerini, uygulama ayarlarını ve gizlilik taleplerini nasıl işlediğini açıklar.","page_title": "PlaySat TV Gizlilik Politikası","updated_label": "Son güncelleme:","controller_label": "Veri sorumlusu ve geliştirici:","website_label": "Web sitesi:","support_label": "Gizlilik ve destek:","back": "Playsat’a dön","home": "Ana sayfa","footer_policy": "PlaySat TV Gizlilik Politikası","content": "\n<div class=\"privacy-note\"><strong>Önemli:</strong> PlaySat TV bir medya oynatıcıdır. Uygulama üçüncü taraf IPTV abonelikleri, kanallar, filmler veya diziler içermez, satmaz, barındırmaz ya da dağıtmaz. Kullanıcı yalnızca yasal olarak erişme hakkına sahip olduğu oynatma listelerini ve kaynakları kullanmalıdır.</div>\n<h2>1. Kapsam</h2><p>Bu Gizlilik Politikası Android telefon ve tabletler, Android TV, iPhone, iPad, Apple TV (tvOS), webOS çalıştıran LG Smart TV’ler, Tizen çalıştıran Samsung Smart TV’ler ve desteklenen diğer cihazlardaki PlaySat TV için geçerlidir. Kullanılabilirlik ülkeye, cihaza ve ilgili uygulama mağazasının onayına göre değişebilir.</p><p>Politika ayrıca uygun olduğu ölçüde deneme süreleri, lisans doğrulama, cihaz etkinleştirme, satın alma doğrulama, demo içerik, müşteri desteği, PlaySat web sitesi ve arka uç veya güvenlik hizmetleri için de geçerlidir.</p><p>Kullanıcının seçtiği bağımsız IPTV sağlayıcıları, oynatma listesi sağlayıcıları, içerik sağlayıcıları, web siteleri ve diğer hizmetler kendi şartları ve gizlilik politikaları kapsamında çalışır.</p><h2>2. İşlediğimiz Bilgiler</h2><h3>2.1 Oynatma Listesi ve Giriş Bilgileri</h3><p>Bir liste veya kaynak eklediğinizde uygulama liste adını, sunucu ya da liste adresini, kullanıcı adını, parolayı veya erişim belirtecini ve verdiğiniz diğer bağlantı bilgilerini işleyebilir. Bunlar normalde cihazınızda yerel olarak saklanır ve seçtiğiniz sağlayıcıya bağlanmak için kullanılır.</p><p>Bir özellik PlaySat TV sunucusu gerektirirse, sunucu isteği tamamlamak için gerekli bilgileri geçici olarak işleyebilir. PlaySat TV giriş bilgilerini satmaz ve reklam, pazarlama veya profil oluşturma için kullanmaz.</p>\n<h3>2.2 Cihaz ve lisans bilgileri</h3><p>Deneme süreleri, cihaz etkinleştirme, lisans doğrulama, güvenlik ve dolandırıcılığı önleme amacıyla uygulama tarafından oluşturulan, cihazdan türetilen veya platform tarafından sağlanan bir cihaz kimliğini; cihaz türü, model, üretici ve platformu; işletim sistemi sürümünü; uygulama sürümü ve derleme numarasını; paket veya bundle kimliğini; deneme, lisans, etkinleştirme ve sona erme durumunu; son kontrol zamanını; IP adresini ve mevcut uygulama kimliği veya güvenlik doğrulama bilgilerini işleyebiliriz.</p><p>Bir cihaz kimliği uygulamada MAC adresine benzer bir biçimde gösterilebilir. Bu kimlik PlaySat TV tarafından oluşturulmuş olabilir ve cihazın fiziksel ağ MAC adresini temsil etmek zorunda değildir. Lisans ve güvenlik amacıyla uygulama kurulumunu veya cihazı tanımak için kullanılır; kullanıcıyı başka şirketlerin uygulamaları veya web siteleri arasında izlemek için kullanılmaz.</p>\n<h3>2.3 Satın alımlar ve cihaz etkinleştirme</h3><p>iPhone, iPad ve Apple TV’deki satın alımlar Apple tarafından App Store ve StoreKit üzerinden işlenir. Android telefonlar, Android tabletler ve Android TV’deki satın alımlar Google tarafından Google Play Billing üzerinden işlenir.</p><p>LG webOS, Samsung Tizen veya desteklenen başka bir platformda mevcut etkinleştirme ve ödeme yöntemi farklı olabilir. Ayrı bir ödeme sağlayıcısı sunulursa ödeme bilgilerini bu sağlayıcı işler; PlaySat TV yalnızca işlemi doğrulamak ve cihazı etkinleştirmek için gerekli bilgileri alır.</p><p>PlaySat TV tam ödeme kartı numaranızı, banka hesabı numaranızı veya Apple ya da Google hesabı parolanızı almaz ve saklamaz.</p><p>Bir satın alımı doğrulamak ve etkinleştirme sağlamak için mağaza veya platformu, ürün kimliğini, Apple işlem kimliğini veya özgün işlem kimliğini, varsa Google Play satın alma belirtecini veya sipariş kimliğini, uygun olduğunda harici işlem referansını, satın alma tarihini, doğrulama sonucunu, iade, iptal, geri alma veya işlem durumunu, etkinleştirme ve sona erme tarihlerini ve ilişkili PlaySat TV cihaz kimliğini işleyebiliriz.</p><h3>2.4 Yerel Ayarlar</h3><p>Uygulama seçilen dili, favorileri, izlemeye devam verilerini, seçilen veya gizlenen grupları, ebeveyn denetimini, oynatıcı ve altyazı tercihlerini ve diğer ayarları cihazda saklayabilir. Yalnızca cihazınızda kalan ve bize iletilmeyen bilgiler PlaySat TV tarafından toplanmaz.</p>\n<h3>2.5 Ürün Etkileşimi ve Teknik Veriler</h3><p>Hizmeti çalıştırmak ve korumak için lisans kontrolüyle ilişkili açılışlar, istek zamanı ve türü, sunucu yanıtı, sürüm, platform, lisans ve güvenlik sonuçları ve teşhis için gerekli teknik hatalar gibi sınırlı veriler işlenebilir.</p>\n<h3>2.6 Destek ve gizlilik talepleri</h3><p>Bizimle iletişime geçerseniz e-posta adresinizi, mesajınızı, göndermeyi seçtiğiniz ekleri, cihaz veya işlem bilgilerini ve talebi yanıtlamak için gereken teknik ayrıntıları işleyebiliriz. Oynatma listesi parolalarını, Apple veya Google hesabı paro
