lalarını, kart bilgilerini ya da gereksiz kimlik belgelerini normal e-postayla göndermeyin.</p>\n<h3>2.7 Web sitesi tercihleri ve iletişim formu</h3><p>PlaySat web sitesi, web sitesinin ve bu Gizlilik Politikasının seçtiğiniz dilde kalması için seçilen dili tarayıcınızın yerel depolamasında saklayabilir. Bu tercih reklam veya siteler arası izleme amacıyla kullanılmaz.</p><p>Web sitesindeki iletişim formunu gönüllü olarak gönderirseniz talebinizi yanıtlamak amacıyla adınızı, e-posta adresinizi, mesajınızı ve sınırlı teknik istek bilgilerini iletişim formu hizmet sağlayıcımız aracılığıyla işleyebiliriz.</p>\n<h3>2.8 Bilerek toplamadığımız bilgiler</h3><p>Tam ödeme kartı veya banka hesabı bilgilerini, sağlık veya fitness verilerini, adres defteri kişilerini, biyometrik verileri, kesin GPS konumunu, cihazınızda saklanan fotoğraf veya videoları, mikrofon kayıtlarını veya üçüncü taraf reklam verilerini bilerek toplamayız.</p><h2>3. Kullanım Amaçları</h2><ul><li>Uygulamayı ve istenen özellikleri sağlamak.</li><li>Seçilen listeleri ve medya kaynaklarını yüklemek.</li><li>Yasal demo içeriği sunmak.</li><li>Deneme, lisans ve etkinleştirmeleri yönetmek.</li><li>Satın alımları doğrulamak ve teslim etmek.</li><li>Dolandırıcılığı, kötüye kullanımı ve deneme suistimalini önlemek.</li><li>Uygulamayı, hizmetleri ve kullanıcıları korumak.</li><li>Teknik ve uyumluluk sorunlarını gidermek.</li><li>Destek ve gizlilik taleplerini yanıtlamak.</li><li>Muhasebe, vergi, düzenleme ve yasal yükümlülükleri yerine getirmek.</li></ul>\n<h2>4. Hukuki Dayanaklar</h2><p>GDPR veya benzer yasalar uygulandığında işleme; sözleşmenin ifası, güvenlik ve güvenilir işletime ilişkin meşru menfaatlerimiz, yasal yükümlülük veya gerekli olduğunda rıza temelinde yapılır. Rıza, önceki hukuka uygun işlemleri etkilemeden geri çekilebilir.</p>\n<h2>5. Paylaşım ve açıklama</h2><p>Kişisel bilgileri satmayız. Sınırlı bilgiler App Store satın alımları için Apple, Google Play satın alımları için Google, ayrı bir etkinleştirme yöntemi sunulduğunda ödeme ekranında belirtilen ödeme sağlayıcısı, kullanıcının seçtiği oynatma listesi veya içerik sağlayıcısı ve PlaySat TV’yi işletmemize ve korumamıza yardımcı olan barındırma, ağ, güvenlik, e-posta, iletişim formu, içerik dağıtımı veya teknik hizmet sağlayıcıları tarafından işlenebilir.</p><p>Bu sağlayıcılar bilgileri yalnızca hizmetlerini sunmak veya yasal yükümlülüklere uymak için gerekli ölçüde işleyebilir. Bizim adımıza çalışan sağlayıcıların uygun gizlilik ve güvenlik önlemleri uygulamasını bekleriz. Bilgiler ayrıca yasa gerektirdiğinde, kullanıcıları veya hizmeti korumak, dolandırıcılığı önlemek ya da hukuki hakları oluşturmak, kullanmak veya savunmak için açıklanabilir.</p><h2>6. Reklam ve İzleme</h2><p>PlaySat TV üçüncü taraf reklam göstermez, kişisel verileri hedefli reklam için kullanmaz, veri aracılarında satmaz ve başka şirketlerin uygulama veya sitelerinde izleme amacıyla üçüncü taraf verileriyle birleştirmez.</p>\n<h2>7. Veri saklama</h2><ul><li><strong>Yerel oynatma listeleri, uygulama ayarları ve web sitesi dil tercihi:</strong> siz kaldırana, uygulama veya tarayıcı verilerini temizleyene ya da uygulamayı kaldırana kadar, platformun yedekleme davranışına tabi olarak saklanır.</li><li><strong>Cihaz ve lisans kayıtları:</strong> deneme, lisans veya etkinleştirme aktif olduğu sürece ve sonrasında yalnızca güvenlik, dolandırıcılığı önleme, uyuşmazlıklar, hukuki talepler veya yasal yükümlülükler için makul olarak gerekli olduğu süre boyunca saklanır.</li><li><strong>Satın alma ve işlem kayıtları:</strong> etkinleştirmeyi doğrulamak ve sağlamak için gerekli olduğu sürece ve sonrasında iade, muhasebe, vergi, dolandırıcılığı önleme, uyuşmazlık veya diğer yasal yükümlülükler için gerektiğinde saklanır.</li><li><strong>Sunucu ve güvenlik günlükleri:</strong> hizmeti korumak ve işletmek ile hata veya kötüye kullanımı araştırmak için makul olarak gerekli süre boyunca saklanır.</li><li><strong>Destek ve iletişim formu yazışmaları:</stro     function getQueryLanguage() {
      var match = window.location.search.match(/[?&]lang=(sv|en|fr|es|de|tr|ar)(?:&|$)/i);

    }

    function setPrivacyLanguage(lang) {
      if (!privacyTranslations[lang]) { lang = 'en'; }
      var t = privacyTranslations[lang];

      document.documentElement.lang = lang;
      document.body.dir = lang === 'ar' ? 'rtl' : 'ltr';
      document.getElementById('lang-switcher').value = lang;
      document.title = t.page_title;

      setText('nav-services', t.nav_services);

      try { localStorage.setItem('playsat_language', lang); } catch (e) {}
    }

    document.addEventListener('DOMContentLoaded', function() {
      var lang = getQueryLanguage();
      if (!lang) {
        try { lang = localStorage.getItem('playsat_language') || ''; } catch (e) { lang = ''; }
      }
      if (!privacyTranslations[lang]) { lang = 'en'; }
      setPrivacyLanguage(lang);
